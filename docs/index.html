<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stretford Radar | Traffic Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { background-color: #020617; }
        #chart-tooltip {
            opacity: 0; position: absolute; background: rgba(15, 23, 42, 0.95); color: white;
            border-radius: 12px; padding: 16px; pointer-events: none; transition: opacity 0.15s ease;
            border: 1px solid #334155; z-index: 100; min-width: 200px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
        .hist-bar { background: #3b82f6; width: 14px; margin-right: 3px; align-self: flex-end; border-radius: 2px 2px 0 0; }
        .hist-bar.speeding { background: #ef4444; }
        canvas { cursor: crosshair; }
    </style>
</head>
<body class="text-slate-200 min-h-screen font-sans">

    <div id="chart-tooltip"></div>

    <div class="container mx-auto p-4 lg:p-10 max-w-7xl">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-6">
            <div>
                <div class="flex items-center gap-3">
                    <span class="text-3xl">📡</span>
                    <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">Stretford Radar</h1>
                </div>
                <p class="text-slate-500 text-sm font-medium mt-1">Direct observation & speed analytics for traffic enforcement</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 bg-slate-900/50 p-2 rounded-2xl border border-slate-800">
                <div class="flex items-center gap-2 px-3 border-r border-slate-800">
                    <label class="text-[10px] font-black uppercase text-slate-500">Threshold</label>
                    <input type="number" id="threshold" value="30" onchange="renderChart()" 
                           class="bg-slate-800 w-14 px-1 py-1 rounded-lg border border-slate-700 text-center font-bold text-blue-400 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-xl text-xs font-black uppercase tracking-wider transition-all active:scale-95 flex items-center gap-2">
                    <span>🔄</span> Refresh Feed
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-slate-900/40 border border-slate-800 p-4 rounded-2xl">
                <p class="text-[10px] font-bold text-slate-500 uppercase">Total Volume</p>
                <p id="stat-total" class="text-2xl font-black text-white">0</p>
            </div>
            <div class="bg-slate-900/40 border border-slate-800 p-4 rounded-2xl">
                <p class="text-[10px] font-bold text-slate-500 uppercase">Speeding %</p>
                <p id="stat-pct" class="text-2xl font-black text-red-500">0%</p>
            </div>
            <div class="bg-slate-900/40 border border-slate-800 p-4 rounded-2xl">
                <p class="text-[10px] font-bold text-slate-500 uppercase">Max Speed (Adj)</p>
                <p id="stat-max" class="text-2xl font-black text-blue-400">0 <span class="text-xs uppercase">mph</span></p>
            </div>
            <div class="bg-slate-900/40 border border-slate-800 p-4 rounded-2xl">
                <p class="text-[10px] font-bold text-slate-500 uppercase">System Error Adj.</p>
                <p class="text-2xl font-black text-slate-400">-10%</p>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <div class="flex flex-row lg:flex-col gap-2 lg:w-56 shrink-0">
                <button onclick="updateFilter('all')" id="btn-all" class="filter-btn bg-blue-600 text-white text-xs px-5 py-3 rounded-xl font-black uppercase tracking-widest text-left transition-colors">All Traffic</button>
                <button onclick="updateFilter('speeding')" id="btn-speeding" class="filter-btn bg-slate-900 text-slate-400 text-xs px-5 py-3 rounded-xl font-black uppercase tracking-widest text-left hover:bg-slate-800 transition-colors">Speeders Only</button>
                <button onclick="updateFilter('non-speeding')" id="btn-non" class="filter-btn bg-slate-900 text-slate-400 text-xs px-5 py-3 rounded-xl font-black uppercase tracking-widest text-left hover:bg-slate-800 transition-colors">Non-Speeding</button>
            </div>

            <div class="flex-grow bg-slate-900/40 p-1 rounded-3xl border border-slate-800 shadow-inner">
                <div class="p-6">
                    <div class="h-[450px] relative">
                        <canvas id="trafficChart"></canvas>
                    </div>
                </div>

                <div class="flex justify-center gap-1 p-2 bg-slate-950/50 rounded-b-3xl border-t border-slate-800">
                    <button onclick="updateHorizon('day')" id="hz-day" class="hz-btn bg-slate-800 text-white text-[10px] px-6 py-2 rounded-full font-black uppercase tracking-widest transition">24 Hours</button>
                    <button onclick="updateHorizon('week')" id="hz-week" class="hz-btn text-slate-500 text-[10px] px-6 py-2 rounded-full font-black uppercase tracking-widest hover:text-white transition">7 Days</button>
                    <button onclick="updateHorizon('month')" id="hz-month" class="hz-btn text-slate-500 text-[10px] px-6 py-2 rounded-full font-black uppercase tracking-widest hover:text-white transition">30 Days</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE CONFIG ---
        // REPLACE WITH YOUR ACTUAL PROJECT CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://pi-speedcamera-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "pi-speedcamera",
            storageBucket: "pi-speedcamera.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let rawData = [];
        let currentFilter = 'all';
        let currentHorizon = 'day';
        let chart;

        // --- 2. DATA PROCESSING (Includes 10% Correction) ---
        function processBins() {
            const threshold = parseInt(document.getElementById('threshold').value);
            const now = Math.floor(Date.now() / 1000);
            let binSize, numBins;

            if (currentHorizon === 'day') { binSize = 3600; numBins = 24; }
            else if (currentHorizon === 'week') { binSize = 21600; numBins = 28; }
            else { binSize = 86400; numBins = 30; }

            const startTime = now - (numBins * binSize);
            const bins = Array.from({length: numBins}, (_, i) => ({
                t: startTime + (i * binSize),
                speeding: 0, normal: 0, speeds: []
            }));

            let totalObs = 0, speeders = 0, maxSpeed = 0;

            rawData.forEach(obs => {
                // APPLY 10% ERROR REDUCTION
                const adjSpeed = obs.speed * 0.9;
                
                if (adjSpeed > maxSpeed) maxSpeed = adjSpeed;

                const idx = Math.floor((obs.timestamp - startTime) / binSize);
                if (idx >= 0 && idx < numBins) {
                    totalObs++;
                    if (adjSpeed > threshold) {
                        bins[idx].speeding++;
                        speeders++;
                    } else {
                        bins[idx].normal++;
                    }
                    bins[idx].speeds.push(adjSpeed);
                }
            });

            // Update UI Stats
            document.getElementById('stat-total').innerText = totalObs.toLocaleString();
            document.getElementById('stat-pct').innerText = totalObs > 0 ? ((speeders/totalObs)*100).toFixed(1) + '%' : '0%';
            document.getElementById('stat-max').innerText = maxSpeed.toFixed(1);

            return bins;
        }

        // --- 3. CUSTOM HISTOGRAM GENERATOR ---
        const getTooltipHtml = (bin) => {
            const threshold = parseInt(document.getElementById('threshold').value);
            const total = bin.speeding + bin.normal;
            const pct = total > 0 ? ((bin.speeding/total)*100).toFixed(0) : 0;
            
            // Histogram Bins
            const ranges = [20, 25, 30, 35, 40, 99];
            const counts = [0,0,0,0,0,0];
            bin.speeds.forEach(s => {
                for(let i=0; i<ranges.length; i++) { if(s < ranges[i]) { counts[i]++; break; } }
            });
            const max = Math.max(...counts) || 1;

            let histHtml = '<div class="flex items-end h-16 mt-4 mb-2 border-b border-slate-700/50">';
            counts.forEach((c, i) => {
                const h = (c/max) * 100;
                const isSpeeding = (i === 0 ? 10 : ranges[i-1]) >= threshold;
                histHtml += `<div class="hist-bar ${isSpeeding ? 'speeding' : 'bg-blue-500/50'}" style="height:${h}%"></div>`;
            });
            histHtml += '</div>';

            const timeStr = new Date(bin.t * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const dateStr = new Date(bin.t * 1000).toLocaleDateString();

            return `
                <div class="text-[10px] font-black text-slate-500 uppercase tracking-tighter">${dateStr} @ ${timeStr}</div>
                <div class="text-3xl font-black text-white mt-1">${total} <span class="text-[10px] text-slate-500">CARS</span></div>
                <div class="flex items-center gap-2 mt-1">
                    <div class="h-2 w-2 rounded-full ${pct > 30 ? 'bg-red-500 animate-pulse' : 'bg-green-500'}"></div>
                    <span class="text-xs font-black uppercase ${pct > 30 ? 'text-red-500' : 'text-green-500'}">${pct}% Speeders</span>
                </div>
                ${histHtml}
                <div class="flex justify-between text-[8px] font-black text-slate-600 uppercase tracking-widest">
                    <span>10mph</span><span>25</span><span>40+</span>
                </div>
            `;
        };

        // --- 4. CHART CORE ---
        function renderChart() {
            const bins = processBins();
            const ctx = document.getElementById('trafficChart').getContext('2d');
            
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: bins.map(b => currentHorizon === 'day' ? new Date(b.t*1000).getHours()+':00' : new Date(b.t*1000).toLocaleDateString([], {day:'numeric', month:'short'})),
                    datasets: [
                        { label: 'Speeding', data: bins.map(b => b.speeding), backgroundColor: '#ef4444', hidden: currentFilter === 'non-speeding', stack: 'a', borderRadius: 4 },
                        { label: 'Normal', data: bins.map(b => b.normal), backgroundColor: '#1e293b', hidden: currentFilter === 'speeding', stack: 'a', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            enabled: false,
                            external: function(context) {
                                const tooltipEl = document.getElementById('chart-tooltip');
                                if (context.tooltip.opacity === 0) { tooltipEl.style.opacity = 0; return; }
                                
                                const binIdx = context.tooltip.dataPoints[0].dataIndex;
                                tooltipEl.innerHTML = getTooltipHtml(bins[binIdx]);
                                
                                // FIXED STICKY POSITIONING
                                const position = context.chart.canvas.getBoundingClientRect();
                                tooltipEl.style.opacity = 1;
                                tooltipEl.style.left = position.left + window.pageXOffset + context.tooltip.caretX + 'px';
                                tooltipEl.style.top = position.top + window.pageYOffset + context.tooltip.caretY + 'px';
                                tooltipEl.style.transform = 'translate(-50%, -115%)'; 
                            }
                        }
                    },
                    scales: {
                        x: { stacked: true, grid: { display: false }, ticks: { color: '#475569', font: { size: 9, weight: '900' } } },
                        y: { stacked: true, grid: { color: '#0f172a' }, ticks: { color: '#475569', font: { weight: 'bold' } } }
                    }
                }
            });
        }

        function fetchData() {
            const btn = document.querySelector('button[onclick="fetchData()"]');
            btn.innerText = "⌛ SYNCING...";
            db.ref('observations').once('value', (snap) => {
                const val = snap.val();
                rawData = val ? Object.values(val) : [];
                renderChart();
                btn.innerText = "🔄 Refresh Feed";
            });
        }

        function updateFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.className = "filter-btn bg-slate-900 text-slate-400 text-xs px-5 py-3 rounded-xl font-black uppercase tracking-widest text-left hover:bg-slate-800 transition-colors");
            const activeId = f === 'non-speeding' ? 'btn-non' : 'btn-' + f;
            document.getElementById(activeId).className = "filter-btn bg-blue-600 text-white text-xs px-5 py-3 rounded-xl font-black uppercase tracking-widest text-left transition-colors";
            renderChart();
        }

        function updateHorizon(h) {
            currentHorizon = h;
            document.querySelectorAll('.hz-btn').forEach(b => b.className = "hz-btn text-slate-500 text-[10px] px-6 py-2 rounded-full font-black uppercase tracking-widest hover:text-white transition");
            document.getElementById('hz-' + h).className = "hz-btn bg-slate-800 text-white text-[10px] px-6 py-2 rounded-full font-black uppercase tracking-widest transition";
            renderChart();
        }

        fetchData();
    </script>
</body>
</html>
