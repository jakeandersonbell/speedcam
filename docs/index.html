<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kings Road Traffic Feed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-200 min-h-screen font-sans">

    <div id="chart-tooltip"></div>

    <div class="container mx-auto p-4 lg:p-10 max-w-7xl">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-6">
            <div>
                <div class="flex items-center gap-3">
                    <span class="text-2xl">📡</span>
                    <h1 class="text-2xl md:text-4xl font-black tracking-tighter text-white uppercase italic">Kings Road Traffic Feed</h1>
                </div>
                <p class="mt-4 max-w-2xl text-slate-300 text-sm leading-relaxed">
                    Computer vision monitoring. All speeds reduced by 10% for conservative reporting.
                </p>
            </div>
            
            <div class="flex flex-wrap items-center gap-2 bg-slate-900/50 p-2 rounded-2xl border border-slate-800 w-full md:w-auto">
                <div class="flex flex-grow items-center gap-3 px-3 border-r border-slate-800">
                    <label class="text-[9px] font-black uppercase text-slate-500">LIMIT (MPH)</label>
                    <input type="number" id="threshold" value="30" onchange="renderChart()" 
                           class="bg-slate-800 w-14 px-1 py-2 rounded-lg border border-slate-700 text-center font-bold text-blue-400 outline-none">
                </div>
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-3 rounded-xl text-[10px] font-black uppercase">
                    🔄 Refresh
                </button>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="stat-card">
                <p class="stat-label">Observations</p>
                <p id="stat-total" class="stat-value text-white">0</p>
            </div>
            <div class="stat-card">
                <p id="stat-pct-label" class="stat-label">Speeding Ratio</p>
                <p id="stat-pct" class="stat-value text-red-500">0%</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">Top Speed</p>
                <p id="stat-max" class="stat-value text-blue-400">0 <span class="text-xs font-normal text-slate-500">mph</span></p>
            </div>
        </section>

        <main class="flex flex-col lg:flex-row gap-6">
            <nav class="flex flex-row lg:flex-col gap-2 lg:w-56 overflow-x-auto no-scrollbar">
                <button onclick="updateFilter('all')" id="btn-all" class="filter-btn active">Full Traffic</button>
                <button onclick="updateFilter('speeding')" id="btn-speeding" class="filter-btn">Speeders Only</button>
                <button onclick="updateFilter('non-speeding')" id="btn-non" class="filter-btn">Normal Flow</button>
            </nav>

            <div class="flex-grow bg-slate-900/40 p-1 rounded-3xl border border-slate-800 overflow-hidden">
                <div class="p-4 md:p-6 h-[350px] md:h-[450px]">
                    <canvas id="trafficChart"></canvas>
                </div>
                <div class="horizon-picker no-scrollbar">
                    <button onclick="updateHorizon('hour')" id="hz-hour" class="hz-btn">Past Hour</button>
                    <button onclick="updateHorizon('day')" id="hz-day" class="hz-btn active">Past 24h</button>
                    <button onclick="updateHorizon('week')" id="hz-week" class="hz-btn">Past Week</button>
                </div>
            </div>
        </main>

        <footer class="mt-12 text-center italic text-slate-500 text-sm">
            Please contact Trafford Council regarding road safety on Kings Road.
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
