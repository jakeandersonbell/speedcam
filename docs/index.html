<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stretford Radar Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        canvas { width: 100% !important; height: 400px !important; }
        @media (max-width: 768px) { canvas { height: 300px !important; } }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <div class="container mx-auto p-4 max-w-6xl">
        <header class="mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-3xl font-bold">📡 Stretford Traffic Analytics</h1>
            <p class="text-gray-400">Real-time speed observation monitoring</p>
        </header>

        <div class="flex flex-col md:flex-row gap-6">
            <div class="flex flex-row md:flex-col gap-2 md:w-48 shrink-0">
                <button onclick="updateFilter('all')" id="btn-all" class="filter-btn bg-blue-600 px-4 py-2 rounded font-bold transition">All</button>
                <button onclick="updateFilter('speeding')" id="btn-speeding" class="filter-btn bg-gray-800 px-4 py-2 rounded font-bold transition">Speeding</button>
                <button onclick="updateFilter('non-speeding')" id="btn-non" class="filter-btn bg-gray-800 px-4 py-2 rounded font-bold transition">Non-Speeding</button>
            </div>

            <div class="flex-grow bg-gray-800 p-4 rounded-xl shadow-2xl relative">
                <div id="loader" class="absolute inset-0 flex items-center justify-center bg-gray-800 z-10">
                    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-blue-500"></div>
                </div>
                <canvas id="trafficChart"></canvas>
            </div>
        </div>

        <div class="flex justify-center gap-4 mt-8">
            <button onclick="updateHorizon('day')" id="hz-day" class="hz-btn border-b-2 border-blue-500 px-6 py-2">Past 24h</button>
            <button onclick="updateHorizon('week')" id="hz-week" class="hz-btn border-b-2 border-transparent px-6 py-2 hover:bg-gray-800">Past Week</button>
            <button onclick="updateHorizon('month')" id="hz-month" class="hz-btn border-b-2 border-transparent px-6 py-2 hover:bg-gray-800">Past Month</button>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE CONFIG ---
        // PASTE YOUR CONFIG FROM FIREBASE CONSOLE HERE
        const firebaseConfig = {
            apiKey: "...",
            authDomain: "...",
            databaseURL: "https://pi-speedcamera-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "...",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. STATE MANAGEMENT ---
        let rawData = [];
        let currentFilter = 'all'; // all, speeding, non-speeding
        let currentHorizon = 'day'; // day, week, month
        let chart;

        const SPEED_LIMIT = 30; // Threshold for speeding

        // --- 3. DATA PROCESSING ---
        function processData() {
            const now = Math.floor(Date.now() / 1000);
            let binSize, numBins, startTime;

            if (currentHorizon === 'day') {
                binSize = 3600; // 1 hour
                numBins = 24;
            } else if (currentHorizon === 'week') {
                binSize = 21600; // 6 hours
                numBins = 28;
            } else {
                binSize = 86400; // 1 day
                numBins = 30;
            }

            startTime = now - (numBins * binSize);
            const bins = Array.from({length: numBins}, (_, i) => ({
                label: '',
                speeding: 0,
                normal: 0,
                speeds: [] // For the distribution tooltip
            }));

            rawData.forEach(obs => {
                if (obs.timestamp < startTime) return;
                const binIdx = Math.floor((obs.timestamp - startTime) / binSize);
                if (binIdx >= 0 && binIdx < numBins) {
                    if (obs.speed > SPEED_LIMIT) bins[binIdx].speeding++;
                    else bins[binIdx].normal++;
                    bins[binIdx].speeds.push(obs.speed);
                }
            });

            // Format Labels
            bins.forEach((b, i) => {
                const d = new Date((startTime + (i * binSize)) * 1000);
                if (currentHorizon === 'day') b.label = d.getHours() + ':00';
                else if (currentHorizon === 'week') b.label = d.getDate() + '/' + (d.getMonth()+1) + ' ' + d.getHours() + ':00';
                else b.label = d.getDate() + '/' + (d.getMonth()+1);
            });

            return bins;
        }

        // --- 4. CHART RENDERING ---
        function renderChart() {
            const data = processData();
            const ctx = document.getElementById('trafficChart').getContext('2d');
            
            const speedingSet = {
                label: 'Speeding (>30mph)',
                data: data.map(b => b.speeding),
                backgroundColor: '#ef4444', // Red-500
                hidden: currentFilter === 'non-speeding'
            };

            const normalSet = {
                label: 'Normal Flow',
                data: data.map(b => b.normal),
                backgroundColor: '#6b7280', // Gray-500
                hidden: currentFilter === 'speeding'
            };

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(b => b.label),
                    datasets: [speedingSet, normalSet]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true, grid: { display: false }, ticks: { color: '#9ca3af' } },
                        y: { stacked: true, beginAtZero: true, grid: { color: '#374151' }, ticks: { color: '#9ca3af' } }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (context) => {
                                    const bin = data[context.dataIndex];
                                    const total = bin.speeding + bin.normal;
                                    const pct = total > 0 ? ((bin.speeding / total) * 100).toFixed(1) : 0;
                                    
                                    // Generate lightweight speed distribution string
                                    const s = bin.speeds;
                                    const dist = `Dist: <20: ${s.filter(v=>v<20).length} | 20-30: ${s.filter(v=>v>=20&&v<=30).length} | 30+: ${s.filter(v=>v>30).length}`;
                                    
                                    return [
                                        `Total: ${total} cars`,
                                        `Speeders: ${pct}%`,
                                        dist
                                    ];
                                }
                            }
                        }
                    }
                }
            });
            document.getElementById('loader').classList.add('hidden');
        }

        // --- 5. INTERACTION LOGIC ---
        function updateFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.replace('bg-blue-600', 'bg-gray-800'));
            if (f === 'all') document.getElementById('btn-all').classList.replace('bg-gray-800', 'bg-blue-600');
            else if (f === 'speeding') document.getElementById('btn-speeding').classList.replace('bg-gray-800', 'bg-blue-600');
            else document.getElementById('btn-non').classList.replace('bg-gray-800', 'bg-blue-600');
            renderChart();
        }

        function updateHorizon(h) {
            currentHorizon = h;
            document.querySelectorAll('.hz-btn').forEach(b => b.classList.replace('border-blue-500', 'border-transparent'));
            document.getElementById('hz-' + h).classList.replace('border-transparent', 'border-blue-500');
            renderChart();
        }

        // --- 6. DATA FETCH ---
        db.ref('observations').on('value', (snapshot) => {
            const val = snapshot.val();
            rawData = val ? Object.values(val) : [];
            renderChart();
        });
    </script>
</body>
</html>
