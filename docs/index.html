<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kings Road Traffic Feed | M16 Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { background-color: #020617; }
        #chart-tooltip {
            opacity: 0; position: absolute; background: rgba(15, 23, 42, 0.98); color: white;
            border-radius: 16px; padding: 20px; pointer-events: none; transition: opacity 0.1s ease;
            border: 1px solid #334155; z-index: 100; min-width: 240px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
        }
        .hist-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; align-items: flex-end; height: 60px; margin-top: 16px; }
        .hist-bar { background: #3b82f6; border-radius: 3px 3px 0 0; width: 100%; transition: height 0.3s ease; }
        .hist-bar.speeding { background: #ef4444; }
        .label-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; text-align: center; margin-top: 8px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .filter-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-200 min-h-screen font-sans">

    <div id="chart-tooltip"></div>

    <div class="container mx-auto p-4 lg:p-10 max-w-7xl">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-6">
            <div>
                <div class="flex items-center gap-3">
                    <span class="text-2xl md:text-3xl">📡</span>
                    <h1 class="text-2xl md:text-4xl font-black tracking-tighter text-white uppercase italic">Kings Road Traffic Feed</h1>
                </div>
                <div class="mt-4 max-w-2xl">
                    <p class="text-slate-300 text-sm leading-relaxed">
                        Live speed analysis for Kings Road, Stretford. 
                        <span class="text-slate-500 italic block mt-1 text-xs font-medium uppercase tracking-wider">
                            Real-time data synced to BST. Conservative 10% speed reduction applied.
                        </span>
                    </p>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center gap-2 bg-slate-900/50 p-2 rounded-2xl border border-slate-800 w-full md:w-auto">
                <div class="flex flex-grow items-center gap-3 px-3 border-r border-slate-800">
                    <label class="text-[9px] font-black uppercase text-slate-500 leading-tight">LIMIT<br>MPH</label>
                    <input type="number" id="threshold" value="30" onchange="renderChart()" 
                           class="bg-slate-800 w-14 px-1 py-2 rounded-lg border border-slate-700 text-center font-bold text-blue-400 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button onclick="fetchData()" class="flex-grow md:flex-initial bg-blue-600 hover:bg-blue-500 text-white px-5 py-3 rounded-xl text-[10px] font-black uppercase tracking-wider active:scale-95 transition-all">
                    🔄 Refresh
                </button>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-slate-900/40 border border-slate-800 p-6 rounded-3xl">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Observations</p>
                <p id="stat-total" class="text-4xl font-black text-white mt-1">0</p>
            </div>
            <div class="bg-slate-900/40 border border-slate-800 p-6 rounded-3xl">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Speeding Ratio</p>
                <p id="stat-pct" class="text-4xl font-black text-red-500 mt-1">0%</p>
            </div>
            <div class="bg-slate-900/40 border border-slate-800 p-6 rounded-3xl">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Top Speed</p>
                <p id="stat-max" class="text-4xl font-black text-blue-400 mt-1">0 <span class="text-xs uppercase font-normal text-slate-500">mph</span></p>
            </div>
        </section>

        <main class="flex flex-col lg:flex-row gap-6">
            <nav class="flex flex-row lg:flex-col gap-2 lg:w-56 overflow-x-auto no-scrollbar">
                <button onclick="updateFilter('all')" id="btn-all" class="filter-btn active shrink-0 bg-blue-600 text-white text-[10px] px-6 py-4 rounded-xl font-black uppercase tracking-widest text-left">Full Traffic</button>
                <button onclick="updateFilter('speeding')" id="btn-speeding" class="filter-btn shrink-0 bg-slate-900 text-slate-400 text-[10px] px-6 py-4 rounded-xl font-black uppercase tracking-widest text-left hover:bg-slate-800">Speeders Only</button>
                <button onclick="updateFilter('non-speeding')" id="btn-non" class="filter-btn shrink-0 bg-slate-900 text-slate-400 text-[10px] px-6 py-4 rounded-xl font-black uppercase tracking-widest text-left hover:bg-slate-800">Normal Flow</button>
            </nav>

            <div class="flex-grow bg-slate-900/40 p-1 rounded-3xl border border-slate-800 shadow-inner overflow-hidden">
                <div class="p-4 md:p-6 h-[350px] md:h-[450px] relative">
                    <canvas id="trafficChart"></canvas>
                </div>
                <div class="flex justify-start md:justify-center gap-1 p-2 px-4 bg-slate-950/50 rounded-b-3xl border-t border-slate-800 overflow-x-auto no-scrollbar">
                    <button onclick="updateHorizon('hour')" id="hz-hour" class="hz-btn text-slate-500 text-[9px] px-6 py-2 rounded-full font-black uppercase tracking-widest hover:text-white transition whitespace-nowrap">Past Hour</button>
                    <button onclick="updateHorizon('day')" id="hz-day" class="hz-btn bg-slate-800 text-white text-[9px] px-6 py-2 rounded-full font-black uppercase tracking-widest transition whitespace-nowrap">Past 24h</button>
                    <button onclick="updateHorizon('week')" id="hz-week" class="hz-btn text-slate-500 text-[9px] px-6 py-2 rounded-full font-black uppercase tracking-widest hover:text-white transition whitespace-nowrap">Past Week</button>
                </div>
            </div>
        </main>

        <footer class="mt-12 mb-8 text-center px-4">
            <div class="h-px w-24 bg-slate-800 mx-auto mb-6"></div>
            <p class="text-slate-400 text-xs max-w-xl mx-auto leading-relaxed">
                Kings Road Radar Project. Data provided for traffic awareness only.
            </p>
        </footer>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const SUPABASE_URL = "https://your-project-id.supabase.co";
        const SUPABASE_ANON_KEY = "your-public-anon-key";

        // Renaming to 'db' to avoid library name collision
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let rawData = [];
        let currentFilter = 'all';
        let currentHorizon = 'day';
        let chart;

        function processBins() {
            const threshold = parseInt(document.getElementById('threshold').value);
            // JS handles the current time in the local timezone (BST)
            const now = Math.floor(Date.now() / 1000); 
            let binSize, numBins;

            if (currentHorizon === 'hour') { binSize = 300; numBins = 12; }
            else if (currentHorizon === 'day') { binSize = 3600; numBins = 24; }
            else if (currentHorizon === 'week') { binSize = 21600; numBins = 28; }
            else { binSize = 86400; numBins = 30; }

            const startTime = now - (numBins * binSize);
            const bins = Array.from({length: numBins}, (_, i) => ({
                t: startTime + (i * binSize),
                speeding: 0, normal: 0, speeds: []
            }));

            let totalObs = 0, speeders = 0, maxSpeed = 0;

            rawData.forEach(obs => {
                const adjSpeed = (obs.speed_mph || 0) * 0.9;
                if (adjSpeed > maxSpeed) maxSpeed = adjSpeed;

                // BST Magic: new Date(obs.captured_at) interprets the UTC string and 
                // converts it to the user's local Unix timestamp automatically.
                const unixTime = Math.floor(new Date(obs.captured_at).getTime() / 1000);

                const idx = Math.floor((unixTime - startTime) / binSize);
                if (idx >= 0 && idx < numBins) {
                    totalObs++;
                    if (adjSpeed > threshold) { bins[idx].speeding++; speeders++; } 
                    else { bins[idx].normal++; }
                    bins[idx].speeds.push(adjSpeed);
                }
            });

            document.getElementById('stat-total').innerText = totalObs.toLocaleString();
            document.getElementById('stat-pct').innerText = totalObs > 0 ? ((speeders/totalObs)*100).toFixed(1) + '%' : '0%';
            document.getElementById('stat-max').innerText = maxSpeed.toFixed(1);

            return bins;
        }

        const getTooltipHtml = (bin) => {
            const threshold = parseInt(document.getElementById('threshold').value);
            const total = bin.speeding + bin.normal;
            const pct = total > 0 ? ((bin.speeding/total)*100).toFixed(0) : 0;
            const ranges = [20, 25, 30, 35, 40, 999];
            const labels = ["<20", "20", "25", "30", "35", "40+"];
            const counts = [0, 0, 0, 0, 0, 0];

            bin.speeds.forEach(s => {
                for(let i=0; i<ranges.length; i++) { 
                    if(s < ranges[i]) { counts[i]++; break; } 
                }
            });
            const max = Math.max(...counts) || 1;

            let histHtml = '<div class="hist-container border-b border-slate-700/50">';
            counts.forEach((c, i) => {
                const h = (c/max) * 100;
                const binFloor = i === 0 ? 0 : ranges[i-1]; 
                const isSpeedingBin = binFloor >= threshold;
                histHtml += `<div class="hist-bar ${isSpeedingBin ? 'speeding' : ''}" style="height:${h}%"></div>`;
            });
            histHtml += '</div>';

            let labelHtml = '<div class="label-grid text-[8px] font-black text-slate-600 uppercase tracking-tighter">';
            labels.forEach(l => labelHtml += `<span>${l}</span>`);
            labelHtml += '</div>';

            return `
                <div class="text-[10px] font-black text-slate-500 uppercase tracking-tighter mb-1">
                    ${new Date(bin.t * 1000).toLocaleString([], { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' })}
                </div>
                <div class="text-3xl font-black text-white">${total} <span class="text-[10px] text-slate-500">CARS</span></div>
                <div class="flex items-center gap-2 mt-1">
                    <div class="h-2 w-2 rounded-full ${pct > 25 ? 'bg-red-500 animate-pulse' : 'bg-green-500'}"></div>
                    <span class="text-[11px] font-black uppercase ${pct > 25 ? 'text-red-500' : 'text-green-500'}">${pct}% Speeders</span>
                </div>
                ${histHtml}${labelHtml}
            `;
        };

        function renderChart() {
            const bins = processBins();
            const ctx = document.getElementById('trafficChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: bins.map(b => {
                        const date = new Date(b.t*1000);
                        if (currentHorizon === 'hour') return date.toLocaleTimeString([], {minute:'2-digit'}) + 'm';
                        // Displays the hour in local BST automatically
                        if (currentHorizon === 'day') return date.toLocaleTimeString([], {hour: '2-digit'});
                        return date.toLocaleDateString([], {day:'numeric', month:'short'});
                    }),
                    datasets: [
                        { label: 'Speeding', data: bins.map(b => b.speeding), backgroundColor: '#ef4444', hidden: currentFilter === 'non-speeding', stack: 'a', borderRadius: 4 },
                        { label: 'Normal', data: bins.map(b => b.normal), backgroundColor: '#1e293b', hidden: currentFilter === 'speeding', stack: 'a', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            enabled: false,
                            external: function(context) {
                                const tooltipEl = document.getElementById('chart-tooltip');
                                if (context.tooltip.opacity === 0) { tooltipEl.style.opacity = 0; return; }
                                const binIdx = context.tooltip.dataPoints[0].dataIndex;
                                tooltipEl.innerHTML = getTooltipHtml(bins[binIdx]);
                                const position = context.chart.canvas.getBoundingClientRect();
                                tooltipEl.style.opacity = 1;
                                tooltipEl.style.left = (position.left + window.pageXOffset + context.tooltip.caretX) + 'px';
                                tooltipEl.style.top = (position.top + window.pageYOffset + context.tooltip.caretY - 20) + 'px';
                                tooltipEl.style.transform = 'translate(-50%, -100%)'; 
                            }
                        }
                    },
                    scales: {
                        x: { stacked: true, grid: { display: false }, ticks: { color: '#475569', font: { size: 9, weight: '900' } } },
                        y: { stacked: true, grid: { color: '#0f172a' }, ticks: { color: '#475569', font: { weight: 'bold' } } }
                    }
                }
            });
        }

        async function fetchData() {
            const btn = document.querySelector('button[onclick="fetchData()"]');
            btn.innerHTML = "⌛ WAIT";

            const now = new Date();
            let hoursBack = 24;
            if (currentHorizon === 'hour') hoursBack = 1;
            if (currentHorizon === 'week') hoursBack = 168;
            
            // We fetch relative to the current UTC time
            const cutoff = new Date(now.getTime() - (hoursBack * 60 * 60 * 1000)).toISOString();

            try {
                const { data, error } = await db
                    .from('observations')
                    .select('speed_mph, captured_at')
                    .gt('captured_at', cutoff)
                    .order('captured_at', { ascending: false })
                    .limit(5000);

                if (error) throw error;
                rawData = data || [];
                renderChart();
            } catch (err) {
                console.error("Fetch Error:", err);
            } finally {
                btn.innerHTML = "🔄 Refresh";
            }
        }

        function updateFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white');
                b.classList.add('bg-slate-900', 'text-slate-400');
            });
            const activeId = f === 'non-speeding' ? 'btn-non' : 'btn-' + f;
            document.getElementById(activeId).classList.add('bg-blue-600', 'text-white');
            renderChart();
        }

        function updateHorizon(h) {
            currentHorizon = h;
            document.querySelectorAll('.hz-btn').forEach(b => {
                b.classList.remove('bg-slate-800', 'text-white');
                b.classList.add('text-slate-500');
            });
            document.getElementById('hz-' + h).classList.add('bg-slate-800', 'text-white');
            fetchData();
        }

        // Initialize
        fetchData();

        // Optional: Real-time listener if you enabled replication in Supabase Dashboard
        db.channel('realtime_observations')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'observations' }, payload => {
            console.log("New car detected live!");
            fetchData(); 
          })
          .subscribe();

    </script>
</body>
</html>
